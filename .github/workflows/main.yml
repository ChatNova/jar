name: Build DarkPresence Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip source code
        run: unzip darkpresence-src-v5.zip -d extracted/

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Create settings.gradle
        run: |
          cat > extracted/darkpresence/settings.gradle << 'EOF'
          pluginManagement {
            repositories {
              maven { url "https://maven.fabricmc.net/" }
              gradlePluginPortal()
            }
          }
          rootProject.name = "darkpresence"
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Build with Gradle
        run: |
          cd extracted/darkpresence
          gradle build

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: darkpresence-mod
          path: extracted/darkpresence/build/libs/*.jar
